# Render Blueprint — Commerce-AI (Postgres + FastAPI backend + Next.js frontend)
# Render panelinde: New + → Blueprint → bu repo'yu seç. Detaylar: DEPLOY.md
databases:
  - name: commerce-ai-db
    plan: free
    databaseName: commerce_ai
    user: commerce

services:
  # --- Backend (FastAPI) ---
  - type: web
    name: commerce-ai-api
    runtime: python
    plan: free
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: DATABASE_URL
        fromDatabase:
          name: commerce-ai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true        # Render rastgele güçlü secret üretir
      - key: ALLOWED_ORIGINS
        value: "*"                  # Bearer token kullanıyoruz, cookie yok
      - key: SEED_ON_START
        value: "1"                  # ilk açılışta demo veriyi yükle (sonra atlar)
      - key: LLM_API_KEY
        sync: false                 # opsiyonel; boşsa AI fallback ile çalışır

  # --- Frontend (Next.js) ---
  - type: web
    name: commerce-ai-web
    runtime: node
    plan: free
    rootDir: apps/web
    buildCommand: npm install && npm run build
    startCommand: npx next start -p $PORT
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        sync: false                 # backend deploy olunca URL'sini buraya gir, web'i redeploy et
